<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | ProClinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .letter-spacing-1 { letter-spacing: 0.1em; }
    </style>
</head>
<body class="bg-light">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
        <div class="card shadow-sm w-100" style="max-width: 460px;">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h1 class="h4 mb-0">Verify OTP</h1>
                    <a href="{% url 'patient_login' %}" class="btn btn-sm btn-outline-secondary">Back</a>
                </div>
                <p class="text-muted small">We've sent a 6-digit code to your registered email if it exists.</p>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} py-2 text-center small">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3 text-center">
                        <label class="form-label fw-bold" for="id_otp">6-Digit Code</label>
                        <input type="text" class="form-control text-center fs-4 letter-spacing-1" name="otp" id="id_otp" required autofocus maxlength="6" pattern="\d{6}" title="Please enter exactly 6 digits">
                    </div>
                    <button type="submit" class="btn btn-success w-100">Verify Code</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="small text-muted mb-1">Didn't receive the code?</p>
                    <form method="post" action="{% url 'patient_forgot_password_request' %}" class="d-inline">
                        {% csrf_token %}
                        <input type="hidden" name="identifier" value="{{ identifier }}">
                        <button type="submit" class="btn btn-link btn-sm text-decoration-none p-0 text-success">Resend OTP</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
