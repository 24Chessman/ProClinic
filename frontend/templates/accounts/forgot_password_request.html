<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | ProClinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
        <div class="card shadow-sm w-100" style="max-width: 460px;">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h1 class="h4 mb-0">Forgot Password</h1>
                    <a href="{% url 'patient_login' %}" class="btn btn-sm btn-outline-secondary">Back</a>
                </div>
                <p class="text-muted small">Enter your patient username or email to receive a password reset OTP.</p>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} py-2 text-center small">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="id_identifier">Username or Email</label>
                        <input type="text" class="form-control" name="identifier" id="id_identifier" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Send OTP</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
